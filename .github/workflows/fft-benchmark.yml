name: FFT Benchmark (Apple Silicon)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: macos-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: |
          clang++ -std=c++17 -O3 -march=native -ffast-math -g \
            main.cpp -o fft_benchmark -framework Accelerate
          echo "Compilation successful"

      - name: Verify architecture
        run: |
          ARCH=$(file fft_benchmark | grep -o 'arm64')
          [ "$ARCH" = "arm64" ] && echo "Native ARM64 binary confirmed" || { echo "Wrong architecture"; exit 1; }

      - name: Detect Apple Chip & Log Hardware Context
        run: |
          echo "=== Hardware Detection ==="
          CHIP=$(sysctl -n machdep.cpu.brand_string 2>/dev/null | grep -oE 'Apple M[0-9]+[A-Z ]*' | xargs || echo "Apple Silicon")
          MODEL=$(sysctl -n hw.model 2>/dev/null || echo "N/A")
          CORES=$(sysctl -n hw.activecpu 2>/dev/null || echo "N/A")
          
          echo "Chip: $CHIP"
          echo "Model Identifier: $MODEL"
          echo "Active CPU Cores: $CORES"
          
          # Save to environment for later steps
          echo "chip_name=$CHIP" >> $GITHUB_ENV
          echo "model_id=$MODEL" >> $GITHUB_ENV
          echo "core_count=$CORES" >> $GITHUB_ENV

      - name: Run Benchmark
        run: |
          echo "Running FFT Benchmark on ${chip_name:-Apple Silicon}..."
          ./fft_benchmark > benchmark_results.txt 2>&1
          EXIT_CODE=$?
          
          # Prepend hardware context to results file for traceability
          if [ -f benchmark_results.txt ]; then
            echo "# Hardware: ${chip_name:-Unknown} | Model: ${model_id:-N/A} | Cores: ${core_count:-N/A} | Runner: $GITHUB_RUN_ID" | cat - benchmark_results.txt > temp && mv temp benchmark_results.txt
          fi
          
          cat benchmark_results.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Benchmark crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "Benchmark completed successfully"

    
      - name: Generate GitHub Job Summary
        run: |
          echo "## Apple Silicon FFT Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "**Chip:** ${chip_name:-Apple Silicon}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${model_id:-N/A} | **Cores:** ${core_count:-N/A}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** Clang with \`-O3 -march=native -ffast-math\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat benchmark_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fft-benchmark-results-arm64-${{ env.chip_name }}
          path: benchmark_results.txt
          retention-days: 90
