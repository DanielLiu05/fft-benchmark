name: FFT Benchmark (Apple Silicon)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-benchmark:
    # macos-latest (macos-14 and newer) defaults to Apple Silicon (M1/M2) ARM64 runners
    runs-on: macos-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: |
          clang++ -std=c++17 -O3 -march=native -ffast-math -g \
            main.cpp -o fft_benchmark -framework Accelerate
          echo "Compilation successful"

      - name: Verify architecture
        run: |
          ARCH=$(file fft_benchmark | grep -o 'arm64')
          [ "$ARCH" = "arm64" ] && echo "Native ARM64 binary confirmed" || { echo "Wrong architecture"; exit 1; }

      - name: Run Benchmark
        run: |
          echo "Running FFT Benchmark..."
          ./fft_benchmark > benchmark_results.txt 2>&1
          EXIT_CODE=$?
          cat benchmark_results.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Benchmark crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "Benchmark completed successfully"

      - name: Validate Output
        run: |
          [ -s benchmark_results.txt ] || { echo "Empty output"; exit 1; }
          
          # Updated to match the new statistical benchmark harness
          grep -q "Advanced FFT Benchmark" benchmark_results.txt || { echo "Missing benchmark header"; exit 1; }
          grep -q "Median:" benchmark_results.txt || { echo "Missing statistical timing data"; exit 1; }
          grep -q "Custom ARM NEON" benchmark_results.txt || { echo "Missing NEON engine results"; exit 1; }
          
          echo "Output validation successful!"

      - name: Generate GitHub Job Summary
        # This renders the results directly on the GitHub Actions UI page
        run: |
          echo "## Apple Silicon FFT Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** ARM64 (Apple Silicon M-Series)" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** Clang with \`-O3 -march=native -ffast-math\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat benchmark_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fft-benchmark-results-arm64
          path: benchmark_results.txt
          retention-days: 90
