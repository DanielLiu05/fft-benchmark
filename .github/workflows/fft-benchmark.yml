name: FFT Benchmark (Apple Silicon)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: |
          clang++ -std=c++17 -O3 -march=native -ffast-math -g \
            main.cpp -o fft_benchmark -framework Accelerate
          echo "Compilation successful"

      - name: Verify architecture
        run: |
          ARCH=$(file fft_benchmark | grep -o 'arm64')
          [ "$ARCH" = "arm64" ] && echo "Native ARM64 binary" || { echo "Wrong arch"; exit 1; }

      - name: Run Benchmark
        run: |
          echo "Running FFT Benchmark..."
          ./fft_benchmark > benchmark_results.txt 2>&1
          EXIT_CODE=$?
          cat benchmark_results.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Benchmark crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "✅ Benchmark completed successfully"

      - name: Validate Output
        run: |
          [ -s benchmark_results.txt ] || { echo "Empty output"; exit 1; }
          grep -q "Avg Time:" benchmark_results.txt || { echo "Missing timing data"; exit 1; }

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: fft-benchmark-results-arm64
          path: benchmark_results.txt
          retention-days: 90
